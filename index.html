<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Answer Book - Generative Text</title>
    <link rel="stylesheet" href="styles.css">
</head>
<body>
    <div class="book-container">
        <div class="book">
            <div class="book-cover">
                <h1>📖 The Answer Book</h1>
                <p class="subtitle">Click for wisdom</p>
            </div>
            
            <div class="book-page" id="bookPage">
                <p class="question-prompt">What question is on your mind?</p>
                <div class="answer-box" id="answerBox">
                    <p class="answer-text" id="answerText">Click the button to receive your answer...</p>
                </div>
            </div>
            
            <button class="generate-btn" id="generateBtn">✨ Seek Answer ✨</button>
            
            <div class="book-footer">
                <p>Click to open the book to a random page</p>
            </div>
        </div>
    </div>
    
    <script src="script.js"></script>
</body>
</html>
